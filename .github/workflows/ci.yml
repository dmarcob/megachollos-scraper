name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Unit tests
        run: mvn test

      - name: Integration tests
        env:
          DOCKER_API_VERSION: "1.41"
        run: mvn failsafe:integration-test failsafe:verify
