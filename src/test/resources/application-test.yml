logging:
  level:
    io.github.bonigarcia: DEBUG

spring:
  liquibase:
    enabled: false

core:
  swagger:
    server:
      url: http://localhost:${server.port}
      description: Local Server
  logstash:
    url: localhost:5044

megachollos:
  elasticsearch:
    index: megachollos-productos

jpa:
  hibernate:
    ddl-auto: create-drop
  show-sql: true
  properties:
    hibernate:
      format_sql: true